<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会議室予約</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #fff;
    color: #222;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .app {
    display: grid;
    grid-template-columns: 1fr 320px;
    height: 100vh;
    overflow: hidden;
  }

  .calendar-side {
    border-right: 1px solid #ddd;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid #ddd;
    flex-shrink: 0;
  }

  .cal-title { font-size: 18px; font-weight: 700; }

  .cal-nav { display: flex; gap: 4px; }

  .cal-nav button {
    width: 36px; height: 36px;
    border: 1px solid #ddd; background: #fff; border-radius: 4px;
    font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; color: #555;
  }

  .cal-nav button:active { background: #f0f0f0; }

  .today-btn {
    width: auto !important; padding: 0 12px !important;
    font-size: 13px !important; font-family: inherit; font-weight: 500;
  }

  .day-header-row {
    display: grid;
    grid-template-columns: 56px repeat(7, 1fr);
    border-bottom: 1px solid #ddd; flex-shrink: 0;
  }

  .day-header-corner { border-right: 1px solid #ddd; }

  .day-header {
    text-align: center; padding: 10px 0; font-size: 12px;
    color: #888; border-right: 1px solid #eee;
  }

  .day-header:last-child { border-right: none; }
  .day-header .day-name { font-weight: 500; }

  .day-header .day-num {
    font-size: 20px; font-weight: 700; color: #222; margin-top: 2px;
    width: 32px; height: 32px; line-height: 32px;
    margin-left: auto; margin-right: auto; border-radius: 50%;
  }

  .day-header.today .day-num { background: #1a73e8; color: #fff; }
  .day-header.today .day-name { color: #1a73e8; }

  .cal-body { flex: 1; overflow-y: auto; position: relative; }

  .cal-grid {
    display: grid;
    grid-template-columns: 56px repeat(7, 1fr);
    position: relative;
  }

  .time-col { border-right: 1px solid #ddd; }

  .time-label {
    height: 60px; font-size: 11px; color: #888;
    text-align: right; padding-right: 8px; position: relative; top: -7px;
  }

  .day-col { border-right: 1px solid #eee; position: relative; }
  .day-col:last-child { border-right: none; }

  .hour-line { height: 60px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
  .hour-line:hover { background: #f8f9ff; }

  .res-block {
    position: absolute; left: 2px; right: 2px;
    border-radius: 4px; padding: 4px 6px; font-size: 11px;
    overflow: hidden; cursor: pointer; z-index: 2;
    border-left: 3px solid; line-height: 1.3;
  }

  .res-block .res-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .res-block .res-time { font-size: 10px; opacity: 0.8; }

  .res-c0 { background: #d4e4fd; border-color: #1a73e8; color: #174ea6; }
  .res-c1 { background: #fce8e6; border-color: #d93025; color: #a50e0e; }
  .res-c2 { background: #e6f4ea; border-color: #188038; color: #0d652d; }
  .res-c3 { background: #fef7e0; border-color: #f9ab00; color: #7c5800; }
  .res-c4 { background: #f3e8fd; border-color: #8430ce; color: #5b1d99; }
  .res-c5 { background: #e0f5f5; border-color: #009688; color: #00695c; }

  .now-line {
    position: absolute; left: 0; right: 0;
    height: 2px; background: #ea4335; z-index: 3; pointer-events: none;
  }

  .now-line::before {
    content: ''; position: absolute; left: -5px; top: -4px;
    width: 10px; height: 10px; border-radius: 50%; background: #ea4335;
  }

  .info-side { display: flex; flex-direction: column; overflow: hidden; }

  .info-top { padding: 20px; border-bottom: 1px solid #ddd; text-align: center; }

  .info-date { font-size: 15px; font-weight: 600; margin-bottom: 2px; }

  .info-time { font-size: 40px; font-weight: 700; letter-spacing: -1px; line-height: 1.1; }

  .status-box {
    margin: 16px 0 0; padding: 14px; border: 2px solid;
    border-radius: 6px; text-align: center; font-size: 20px; font-weight: 700;
  }

  .status-box.available { border-color: #188038; color: #188038; background: #e6f4ea; }
  .status-box.occupied { border-color: #d93025; color: #d93025; background: #fce8e6; }

  .status-detail { margin-top: 8px; font-size: 12px; color: #666; font-weight: 400; }

  .action-buttons {
    display: flex; gap: 10px;
    padding: 16px 20px; border-bottom: 1px solid #ddd;
  }

  .action-buttons button {
    flex: 1; padding: 14px 0;
    border: 2px solid #ddd; background: #fff; border-radius: 6px;
    font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer;
  }

  .action-buttons button:active { background: #f5f5f5; }
  .btn-reserve { background: #1a73e8 !important; border-color: #1a73e8 !important; color: #fff; }
  .btn-reserve:active { background: #1557b0 !important; }
  .btn-cancel { color: #d93025; border-color: #d93025 !important; }

  .upcoming-section { flex: 1; overflow-y: auto; }

  .section-label {
    font-size: 12px; font-weight: 600; color: #888;
    padding: 12px 20px 6px; letter-spacing: 0.05em;
  }

  .upcoming-item {
    display: flex; align-items: center;
    padding: 10px 20px; gap: 10px; border-bottom: 1px solid #f0f0f0;
  }

  .upcoming-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .upcoming-info { flex: 1; min-width: 0; }
  .upcoming-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .upcoming-time-text { font-size: 12px; color: #888; }

  .upcoming-del {
    width: 28px; height: 28px; border: 1px solid #ddd; background: #fff;
    border-radius: 4px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 14px; color: #999; flex-shrink: 0;
  }

  .upcoming-del:hover { border-color: #d93025; color: #d93025; }

  .modal-bg {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.35); z-index: 100;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }

  .modal-bg.open { opacity: 1; pointer-events: auto; }

  .modal-box {
    background: #fff; border-radius: 8px; padding: 24px;
    width: 360px; max-width: 90%;
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
  }

  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }

  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 600; color: #666; margin-bottom: 4px; }

  .field input {
    width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px;
    font-size: 15px; font-family: inherit; -webkit-appearance: none;
  }

  .field input:focus { outline: none; border-color: #1a73e8; }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .modal-btns { display: flex; gap: 10px; margin-top: 18px; }

  .modal-btns button {
    flex: 1; padding: 12px; border-radius: 4px; font-size: 14px;
    font-weight: 600; font-family: inherit; cursor: pointer; border: 1px solid #ddd; background: #fff;
  }

  .modal-btns .btn-ok { background: #1a73e8; border-color: #1a73e8; color: #fff; }
  .modal-btns .btn-del { border-color: #d93025; color: #d93025; }

  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: #333; color: #fff; padding: 12px 24px;
    border-radius: 6px; font-size: 14px; z-index: 200;
    transition: transform 0.25s; white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
    .calendar-side { min-height: 55vh; }
    .info-side { max-height: 45vh; border-top: 1px solid #ddd; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="calendar-side">
    <div class="cal-header">
      <div class="cal-title" id="calTitle"></div>
      <div class="cal-nav">
        <button class="today-btn" onclick="goToday()">今日</button>
        <button onclick="prevWeek()">◀</button>
        <button onclick="nextWeek()">▶</button>
      </div>
    </div>
    <div class="day-header-row" id="dayHeaders"></div>
    <div class="cal-body" id="calBody"></div>
  </div>

  <div class="info-side">
    <div class="info-top">
      <div class="info-date" id="infoDate"></div>
      <div class="info-time" id="infoTime">--:--</div>
      <div class="status-box available" id="statusBox">空室</div>
    </div>
    <div class="action-buttons">
      <button class="btn-reserve" onclick="openNewModal()">予約</button>
      <button class="btn-cancel" onclick="cancelCurrent()">取消</button>
    </div>
    <div class="upcoming-section">
      <div class="section-label">本日の予約</div>
      <div id="upcomingList"></div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal-box" id="modalBox"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycby71rclo4EvJCo4CyPQz9e1wMEzsNMtpll5CeKHKAtQYcx5i5iZGupkApS82CVESOjs/exec';

async function loadReservations() {
  try {
    const res = await fetch(GAS_URL);
    const json = await res.json();
    if (json.status === 'ok') {
      reservations = json.data.map(r => ({
        id: Number(r.id),
        name: String(r.name),
        date: String(r.date),
        start: String(r.start),
        end: String(r.end),
        ci: Math.abs(hashCode(String(r.name))) % 6
      }));
      refresh();
    }
  } catch(e) {
    console.error('Load error:', e);
  }
}

function hashCode(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) {
    h = ((h << 5) - h) + s.charCodeAt(i);
    h |= 0;
  }
  return h;
}

async function apiAdd(name, date, start, end) {
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'add', name, date, start, end })
    });
    await loadReservations();
  } catch(e) {
    console.error('Add error:', e);
  }
}

async function apiDelete(id) {
  try {
    await fetch(GAS_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'delete', id })
    });
    await loadReservations();
  } catch(e) {
    console.error('Delete error:', e);
  }
}

let weekOffset = 0;
const START_HOUR = 8, END_HOUR = 21, HOUR_H = 60;

function fmtD(d) { return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function todayS() { return fmtD(new Date()); }
function toM(t) { const [h,m]=t.split(':').map(Number); return h*60+m; }
function mToT(m) { return String(Math.floor(m/60)).padStart(2,'0')+':'+String(m%60).padStart(2,'0'); }

let reservations = [];

function getWeekDates() {
  const now=new Date(); now.setDate(now.getDate()+weekOffset*7);
  const day=now.getDay(); const mon=new Date(now); mon.setDate(mon.getDate()-((day+6)%7));
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(d.getDate()+i); return d; });
}

function renderHeader() {
  const dates=getWeekDates();
  document.getElementById('calTitle').textContent=`${dates[0].getFullYear()}年 ${dates[0].getMonth()+1}月`;
  const DAYS=['月','火','水','木','金','土','日'];
  const today=todayS();
  let h='<div class="day-header-corner"></div>';
  dates.forEach((d,i)=>{
    const ds=fmtD(d);
    h+=`<div class="day-header ${ds===today?'today':''}">
      <div class="day-name">${DAYS[i]}</div><div class="day-num">${d.getDate()}</div></div>`;
  });
  document.getElementById('dayHeaders').innerHTML=h;
}

function renderGrid() {
  const dates=getWeekDates(), today=todayS(), now=new Date(), nowM=now.getHours()*60+now.getMinutes();
  let h='<div class="cal-grid"><div class="time-col">';
  for(let hr=START_HOUR;hr<=END_HOUR;hr++) h+=`<div class="time-label">${String(hr).padStart(2,'0')}:00</div>`;
  h+='</div>';

  dates.forEach(d=>{
    const ds=fmtD(d);
    h+=`<div class="day-col" data-date="${ds}">`;
    for(let hr=START_HOUR;hr<=END_HOUR;hr++)
      h+=`<div class="hour-line" onclick="clickSlot('${ds}','${String(hr).padStart(2,'0')}:00')"></div>`;

    reservations.filter(r=>r.date===ds).forEach(r=>{
      const sM=toM(r.start)-START_HOUR*60, eM=toM(r.end)-START_HOUR*60;
      const top=(sM/60)*HOUR_H, height=((eM-sM)/60)*HOUR_H;
      h+=`<div class="res-block res-c${r.ci%6}" style="top:${top}px;height:${height}px" onclick="openEdit(${r.id})">
        <div class="res-title">${r.name}</div><div class="res-time">${r.start}–${r.end}</div></div>`;
    });

    if(ds===today && nowM>=START_HOUR*60 && nowM<=END_HOUR*60) {
      h+=`<div class="now-line" style="top:${((nowM-START_HOUR*60)/60)*HOUR_H}px"></div>`;
    }
    h+='</div>';
  });
  h+='</div>';
  document.getElementById('calBody').innerHTML=h;

  if(weekOffset===0) {
    const now2=new Date();
    document.getElementById('calBody').scrollTop=Math.max(0,((now2.getHours()*60+now2.getMinutes()-START_HOUR*60)/60)*HOUR_H-180);
  }
}

function updatePanel() {
  const now=new Date(), h=String(now.getHours()).padStart(2,'0'), m=String(now.getMinutes()).padStart(2,'0');
  document.getElementById('infoTime').textContent=`${h}:${m}`;
  const DW=['日','月','火','水','木','金','土'];
  document.getElementById('infoDate').textContent=`${now.getFullYear()}�t${now.getMonth()+1}月${now.getDate()}日（${DW[now.getDay()]}）`;

  const today=todayS(), nowM=now.getHours()*60+now.getMinutes();
  const cur=reservations.find(r=>r.date===today&&toM(r.start)<=nowM&&nowM<toM(r.end));
  const box=document.getElementById('statusBox');

  if(cur) {
    box.className='status-box occupied';
    box.innerHTML=`使用中<div class="status-detail">${cur.name~　${cur.start}–${cur.end}</div>`;
  } else {
    box.className='status-box available';
    const nxt=reservations.filter(r=>r.date===today&&toM(r.start)>nowM).sort((a,b)=>toM(a.start)-toM(b.start))[0];
    if(nxt) {
      const df=toM(nxt.start)-nowM, dh=Math.floor(df/60), dm=df%60;
      box.innerHTML=`空室<div class="status-detail">次: ${nxt.start}〜 ${nxt.name}（${dh>0?dh+'時間':''}${dm>0?dm+'分':''}後）</div>`;
    } else {
      box.innerHTML=`空室<div class="status-detail">本日の残り予約なし</div>`;
    }
  }

  const list=document.getElementById('upcomingList');
  const todayR=reservations.filter(r=>r.date===today).sort((a,b)=>toM(a.start)-toM(b.start));
  const COLS=['#1a73e8','#d93025','#188038','#f9ab00','#8430ce','#009688'];
  if(!todayR.length) { list.innerHTML='<div style="padding:20px;text-align:center;color:#aaa;font-size:13px">予約なし</div>'; return; }
  list.innerHTML=todayR.map(r=>{
    const past=toM(r.end)<=nowM;
    return `<div class="upcoming-item" style="${past?'opacity:0.4':''}">
      <div class="upcoming-dot" style="background:${COLS[r.ci%6]}"></div>
      <div class="upcoming-info"><div class="upcoming-name">${r.name}</div>
      <div class="upcoming-time-text">${r.start}–${r.end}</div></div>
      <button class="upcoming-del" onclick="confirmDel(${r.id})">✕</button></div>`;
  }).join('');
}

function prevWeek(){weekOffset--;refresh();}
function nextWeek(){weekOffset++;refresh();}
function goToday(){weekOffset=0;refresh();}
function clickSlot(date,time){openNewModal(date,time);}

function openNewModal(date,time){
  const d=date||todayS();
  const t=time||mToT(Math.ceil((new Date().getHours()*60+new Date().getMinutes())/30)*30);
  const te=mToT(Math.min(toM(t)+60,END_HOUR*60));
  document.getElementById('modalBox').innerHTML=`
    <div class="modal-title">新規予約</div>
    <div class="field"><label>予約者名</label><input id="mName" placeholder="名前"></div>
    <div class="field"><label>日付</label><input id="mDate" type="date" value="${d}"></div>
    <div class="field-row">
      <div class="field"><label>開始</label><input id="mStart" type="time" value="${t}"></div>
      <div class="field"><label>終了</label><input id="mEnd" type="time" value="${te}"></div>
    </div>
    <div class="modal-btns"><button onclick="closeModal()">キャンセル</button><button class="btn-ok" onclick="submitNew()">予約する</button></div>`;
  document.getElementById('modalBg').classList.add('open');
  setTimeout(()=>document.getElementById('mName')?.focus(),100);
}

async function submitNew(){
  const name=document.getElementById('mName').value.trim(),
    date=document.getElementById('mDate').value,
    start=document.getElementById('mStart').value,
    end=document.getElementById('mEnd').value;
  if(!name){toast('名前を入力してください');return;}
  if(!start||!end){toast('時刻を入力してください');return;}
  if(toM(start)>=toM(end)){toast('終了は開始より後にしてください');return;}
  if(reservations.find(r=>r.date===date&&toM(r.start)<toM(end)&&toM(r.end)>toM(start))){toast('時間が重複しています');return;}
  closeModal();
  toast(`${name}さんの予約を登録中...`);
  await apiAdd(name,date,start,end);
  toast(`${name}さんの予約を登録しました`);
}

function openEdit(id){
  const r=reservations.find(x=>x.id===id); if(!r)return;
  document.getElementById('modalBox').innerHTML=`
    <div class="modal-title">予約詳細</div>
    <div style="margin-bottom:12px"><div style="font-size:16px;font-weight:700">${r.name}</div>
    <div style="color:#666;margin-top:4px">${r.date}　${r.start}–${r.end}</div></div>
    <div class="modal-btns"><button onclick="closeModal()">閉じる</button><button class="btn-del" onclick="doDelete(${r.id})">取消する</button></div>`;
  document.getElementById('modalBg').classList.add('open');
}

function confirmDel(id){
  const r=reservations.find(x=>x.id===id); if(!r)return;
  document.getElementById('modalBox').innerHTML=`
    <div class="modal-title">予約を取消しますか？</div>
    <div style="margin-bottom:8px"><div style="font-weight:600">${r.name}</div>
    <div style="color:#666;font-size:13px">${r.start}–${r.end}</div></div>
    <div class="modal-btns"><button onclick="closeModal()">戻る</button><button class="btn-del" onclick="doDelete(${r.id})">取消する</button></div>`;
  document.getElementById('modalBg').classList.add('open');
}

async function doDelete(id){
  const r=reservations.find(x=>x.id===id);
  closeModal();
  toast(`${r.name}さんの予約を取消中...`);
  await apiDelete(id);
  toast(`${r.name}さんの予約を取消しました`);
}

function cancelCurrent(){
  const today=todayS(),nowM=new Date().getHours()*60+new Date().getMinutes();
  const cur=reservations.find(r=>r.date===today&&toM(r.start)<=nowM&&nowM<toM(r.end));
  cur?confirmDel(cur.id):toast('現在使用中の予約はありません');
}

function closeModal(e){if(e&&e.target!==e.currentTarget)return;document.getElementById('modalBg').classList.remove('open');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

function refresh(){renderHeader();renderGrid();updatePanel();}
refresh();
loadReservations();
setInterval(loadReservations, 30000);
setInterval(updatePanel,10000);
setInterval(renderGrid,60000);
setInterval(()=>{const n=new Date();document.getElementById('infoTime').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');},1000);
</script>
</body>
</html>
